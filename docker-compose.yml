services:
  meteo:
    build: .
    image: meteo_gpx:latest
    container_name: meteo_gpx
    ports:
      - "9013:3000"
    environment:
      PORT: "3000"
      DB_PATH: "/app/data/meteo.db"
      RUST_LOG: "info,meteo_gpx=info"
    volumes:
      - meteo_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  meteo_data:
