services:
  meteo:
    build: .
    image: meteo_gpx:latest
    container_name: meteo_gpx
    ports:
      - "9013:3000"
    environment:
      PORT: "3000"
      DB_PATH: "/app/data/meteo.db"
      SAMPLE_GPX_DIR: "/app/samples"
      RUST_LOG: "info,meteo_gpx=info"
    volumes:
      - meteo_data:/app/data
      - meteo_samples:/app/samples
      # To expose sibling-project GPX files (brm_maps / cyclo_copains), add a
      # docker-compose.override.yml with e.g.:
      #   services:
      #     meteo:
      #       volumes:
      #         - /srv/brm_maps/data/gpx:/app/samples/brm:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  meteo_data:
  meteo_samples:
